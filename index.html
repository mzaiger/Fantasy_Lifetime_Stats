<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy League Stats since 2006</title>
  <style>
    :root {
      --primary: #002d62; /* MLB Blue */
      --secondary: #ba0c2f; /* MLB Red */
      --glass: rgba(255, 255, 255, 0.85);
      --accent: #efbb20;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      margin: 0;
      padding: 0;
      /* Background setup */
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                  url('FOD+Aerial.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--primary);
      padding: 15px 30px;
      border-bottom: 4px solid var(--secondary);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-radius: 0 0 15px 15px;
      margin-bottom: 30px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .mlb-logo { height: 50px; }
    
    h1 { 
      color: white; 
      margin: 0; 
      font-size: 1.8rem; 
      text-transform: uppercase; 
      letter-spacing: 1px;
    }

    .nav { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
      justify-content: center;
      margin-bottom: 30px;
    }

    .nav button {
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .nav button:hover { 
      background: var(--secondary); 
      transform: translateY(-2px);
    }

    #content { 
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    @media (min-width: 1000px) {
      #content.grid-view { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    }

    /* Polished Table Graphics */
    .card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      transition: transform 0.2s ease;
    }

    .card:hover { transform: scale(1.02); }

    h2 { 
      background: var(--primary); 
      color: white; 
      margin: 0; 
      padding: 12px; 
      font-size: 1rem; 
      text-align: center;
      text-transform: uppercase;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: transparent;
    }

    th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
    
    th { 
      background: rgba(0,0,0,0.05); 
      font-size: 0.75rem; 
      color: #666; 
      text-transform: uppercase;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(186, 12, 47, 0.05); }

    .medal-gold { color: #b8860b; font-weight: bold; }
    .medal-silver { color: #707070; font-weight: bold; }
    .medal-bronze { color: #8b4513; font-weight: bold; }

    /* Decorative Baseball Image */
    .footer-graphic {
      position: fixed;
      bottom: -20px;
      right: -20px;
      width: 250px;
      opacity: 0.8;
      z-index: -1;
      pointer-events: none;
    }

    select { padding: 10px; border-radius: 8px; border: none; margin-right: 10px; width: 200px; }
    .show-btn { padding: 10px 20px; background: var(--secondary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;}
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="input_file_1.png" class="mlb-logo" alt="MLB Logo"> <!-- Referencing the MLB silhouette image -->
    <h1>Fantasy League Archive</h1>
  </div>
</header>

<div class="container">
  <div class="nav">
    <button onclick="showPage('lifetime')">Lifetime Rankings</button>
    <button onclick="showPage('seasonRankings')">Season Bests</button>
    <button onclick="showPage('lifetimeRecord')">Win/Loss Records</button>
    <button onclick="showPage('lifetimeMedals')">Trophy Room</button>
    <button onclick="showPage('individualLifetime')">Manager Career</button>
    <button onclick="showPage('individualSeason')">Yearly Breakdown</button>
  </div>

  <div id="content"></div>
</div>

<img src="input_file_0.png" class="footer-graphic" alt="Baseball and Bat"> <!-- Referencing the Baseball/Bat image -->

<script>
// [JS Logic remains the same as your index.html, but wrap table outputs in the .card class]
// Example modification for rankTable function:
function rankTable(title, data) {
  let html = `<div class="card"><h2>${title}</h2>
  <table>
    <thead><tr><th>Rank</th><th>Manager</th><th>Value</th></tr></thead><tbody>`;
  data.forEach((d, i) => {
    let rankClass = i === 0 ? 'medal-gold' : i === 1 ? 'medal-silver' : i === 2 ? 'medal-bronze' : '';
    html += `<tr><td class="${rankClass}">${i + 1}</td><td>${d.name}</td><td><strong>${fmt(d.value)}</strong></td></tr>`;
  });
  html += "</tbody></table></div>";
  return html;
}

// ... rest of your JS logic ...
</script>
</body>
</html>
