<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.8">
<title>Fantasy League Stats — Since 2006</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #162033;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --gold: #c9a227;
    --cream: #f5f0e8;
    --glass: rgba(13,27,42,0.78);
    --glass-light: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    background: var(--navy);
    color: var(--cream);
    position: relative;
  }

  /* ── Background ── */
  #bg {
    position: fixed;
    inset: 0;
    background-image: url('FieldOfDreams.jpg');
    background-size: cover;
    background-position: center 40%;
    z-index: 0;
  }
  #bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(13,27,42,0.82) 0%,
      rgba(13,27,42,0.65) 40%,
      rgba(13,27,42,0.88) 100%
    );
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    padding: 36px 32px 24px;
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(13,27,42,0.95) 0%, transparent 100%);
  }

  .header-imgs {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header-imgs img {
    height: 52px;
    width: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    transition: transform 0.3s ease;
  }
  .header-imgs img:hover { transform: scale(1.08) rotate(-2deg); }
  .bat-img {
    height: 44px !important;
    opacity: 0.9;
  }
  .bat-img:hover { transform: rotate(-35deg) scale(1.1) !important; }

  .header-title {
    flex: 1;
    text-align: center;
    padding: 0 20px;
  }

  .header-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: 0.08em;
    color: #fff;
    text-shadow: 0 2px 20px rgba(192,57,43,0.5), 0 0 60px rgba(0,0,0,0.8);
    line-height: 1;
  }
  .header-title .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 4px;
    opacity: 0.9;
  }

  @media (max-width: 600px) {
    .header-imgs, .header-imgs-right { display: none; }
  nav button {
    font-size: 0.65rem !important;
}

  }
  .stitch-bar {
    position: relative;
    z-index: 10;
    height: 4px;
    background: var(--red);
    box-shadow: 0 0 12px rgba(192,57,43,0.6);
  }

  /* ── Navigation ── */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 18px 32px;
    background: rgba(13,27,42,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }

  nav button {
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--glass-light);
    color: var(--cream);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.2s ease;
    backdrop-filter: blur(6px);
  }
  nav button:hover {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(192,57,43,0.4);
  }
  nav button.active {
    background: var(--red);
    border-color: var(--red-bright);
    color: #fff;
  }

  /* ── Main Content ── */
  #wrapper {
    position: relative;
    z-index: 10;
    padding: 28px 24px;
    min-height: calc(100vh - 180px);
  }

  #content {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 1000px) {
    #content.grid-view {
      grid-template-columns: repeat(5, 1fr);
    }
  }

  /* ── Tables ── */
  table {
    border-collapse: collapse;
    width: 100%;
    background: var(--glass);
    backdrop-filter: blur(12px);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  th, td {
    border: 1px solid rgba(255,255,255,0.07);
    padding: 7px 9px;
    text-align: center;
    font-size: 0.82rem;
    font-family: 'Barlow', sans-serif;
  }

  th {
    background: rgba(192,57,43,0.85);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.1em;
    font-size: 0.8rem;
    text-transform: uppercase;
    border-color: rgba(255,255,255,0.15);
  }

  tr:nth-child(even) { background: rgba(255,255,255,0.04); }
  tr:hover { background: rgba(201,162,39,0.08); transition: background 0.15s; }

  td:nth-child(2) { text-align: left; font-weight: 500; color: #e8dfc8; }

  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  .medal-gold   { color: var(--gold); font-weight: 700; }
  .medal-silver { color: #aaa; font-weight: 700; }
  .medal-bronze { color: #cd7f32; font-weight: 700; }

  select {
    padding: 8px 14px;
    margin-right: 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
    cursor: pointer;
  }

  .show-btn {
    padding: 8px 20px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .show-btn:hover {
    background: var(--red-bright);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(192,57,43,0.4);
  }

  .section-vertical-stack { display: flex; flex-direction: column; gap: 14px; width: 100%; }
  .no-data { color: rgba(255,255,255,0.4); font-style: italic; margin: 12px 0; }

  /* Rank numbers */
  td:first-child { color: var(--gold); font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; }

  /* Score column */
  td:last-child { color: #c9d5e0; }

  tfoot tr td { font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; }

  nav button[style*="gold"].active {
    background: rgba(201,162,39,0.25);
    border-color: var(--gold);
    color: var(--gold);
  }

.menu-container {
  display: flex;
  flex-direction: column; /* Stack the rows vertically */
  gap: 10px;             /* Space between the two rows */
  align-items: center;    /* Optional: centers the rows */
}

.menu-row {
  display: flex;
  flex-wrap: wrap;       /* Allows buttons to wrap on mobile */
  justify-content: center;
  gap: 8px;              /* Space between buttons */
}
</style>
</head>
<body>

<div id="bg"></div>

<header>
  <div class="header-imgs">
    <img src="MLB-Logo.jpg" alt="MLB" />
    <img src="Baseball-bat.jpg" class="bat-img" alt="bat" />
  </div>

  <div class="header-title">
    <h1>Fantasy League Stats</h1>
    <div class="subtitle">⚾ &nbsp; Champions Since 2006 &nbsp; ⚾</div>
  </div>

  <div class="header-imgs header-imgs-right">
    <img src="Baseball-bat.jpg" class="bat-img" alt="bat" />
    <img src="MLB-Logo.jpg" alt="MLB" />
  </div>
</header>

<div class="stitch-bar"></div>

<nav class="menu-container">
  <div class="menu-row">
    <button onclick="setPage('lifetime')">ALL TEAMS LIFETIME RANKINGS</button>
    <button onclick="setPage('seasonRankings')">ALL TEAMS SEASON RANKINGS</button>
    <button onclick="setPage('weeklyRankings')">ALL TEAMS WEEKLY RANKINGS</button>
    <button onclick="setPage('lifetimeRecord')">LIFETIME RECORD</button>
    <button onclick="setPage('lifetimeMedals')">LIFETIME MEDALS</button>
  </div>
  <div class="menu-row">
    <button onclick="setPage('individualLifetime')">INDIVIDUAL LIFETIME STATS</button>
    <button onclick="setPage('individualYearly')">INDIVIDUAL YEARLY STATS</button>
    <button onclick="setPage('individualSeason')">INDIVIDUAL SEASON RANKINGS</button>
    <button onclick="setPage('individualWeekly')">INDIVIDUAL WEEKLY RANKINGS</button>
    <button onclick="setPage('exportData')">EXPORT DATA</button>
  </div>
</nav>

<div id="wrapper">
  <div id="content"></div>
</div>

<script>

let rawData = [];
let weeklyRawData = [];
let managers = {};

const numericFields = ["R","HR","RBI","SB","TB","E","W","CG","SV","QS"];
const avgFields    = ["R","HR","RBI","SB","TB","E","OBP","W","CG","SV","ERA","WHIP","K/9","QS"];
const eraFields    = ["ERA","WHIP"];
const sumFields    = ["R","HR","RBI","SB","TB","E","W","CG","SV","QS"];

let currentPage = "lifetime";

Promise.all([
  fetch("all_seasons_stats.json?v=" + Date.now()).then(r => r.json()),
  fetch("all_seasons_weeks_stats.json?v=" + Date.now()).then(r => r.json())
]).then(([seasonData, weekData]) => {

  rawData = Array.isArray(seasonData)
    ? seasonData
    : Object.values(seasonData).flat();

  weeklyRawData = [];

  Object.keys(weekData).forEach(year => {
    Object.keys(weekData[year]).forEach(week => {
      weeklyRawData.push(...weekData[year][week]);
    });
  });

  processData();

  setPage("lifetime");
});

function processData(){

  managers = {};

  rawData.forEach(r => {

    const mgr = r.manager_nickname || "Unknown";

    if(!managers[mgr]){

      managers[mgr] = {
        seasons:[]
      };
    }

    managers[mgr].seasons.push(r);
  });
}

function isValid(v){

  return v !== undefined &&
         v !== null &&
         v !== "" &&
         !isNaN(v);
}

function fmt(v,d=0){

  return Number(v).toFixed(d);
}

function rankTable(title,arr){

  return `
    <div class="card">
      <h2>${title}</h2>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>Value</th>
          </tr>
        </thead>

        <tbody>

          ${arr.map((r,i)=>`
            <tr>
              <td class="rank">${i+1}</td>
              <td>${r.name}</td>
              <td>${r.value}</td>
            </tr>
          `).join("")}

        </tbody>
      </table>
    </div>
  `;
}

function setPage(page){

  currentPage = page;

  document.querySelectorAll("nav button")
    .forEach(b => b.classList.remove("active"));

  if(event && event.target){
    event.target.classList.add("active");
  }

  const c = document.getElementById("content");

  c.innerHTML = "";

  if(page==="lifetime") showLifetime(c);

  if(page==="seasonRankings") showSeasonRankings(c);

  if(page==="weeklyRankings") showWeeklyRankings(c);

  if(page==="lifetimeRecord") showLifetimeRecord(c);

  if(page==="lifetimeMedals") showLifetimeMedals(c);

  if(page==="individualLifetime") showIndividualLifetime(c);

  if(page==="individualYearly") showIndividualYearly(c);

  if(page==="individualSeason") showIndividualSeason(c);

  if(page==="individualWeekly") showIndividualWeekly(c);

  if(page==="exportData") showExportData(c);
}

function showLifetime(c){

  c.classList.add("grid-view");

  avgFields.forEach(stat => {

    const arr = Object.keys(managers).map(mgr => {

      const vals = managers[mgr].seasons
        .map(s => parseFloat(s[stat]))
        .filter(v => !isNaN(v));

      if(vals.length===0) return null;

      const val = sumFields.includes(stat)
        ? vals.reduce((a,b)=>a+b,0)
        : vals.reduce((a,b)=>a+b,0) / vals.length;

      return {
        name:mgr,
        value:fmt(val, ["OBP","ERA","WHIP","K/9"].includes(stat)?3:0)
      };
    }).filter(Boolean);

    arr.sort((a,b)=>
      eraFields.includes(stat)
        ? parseFloat(a.value)-parseFloat(b.value)
        : parseFloat(b.value)-parseFloat(a.value)
    );

    c.innerHTML += rankTable(stat,arr.slice(0,10));
  });
}

function showSeasonRankings(c){

  c.classList.add("grid-view");

  avgFields.forEach(stat => {

    const arr = rawData
      .map(r => {

        if(!isValid(r[stat])) return null;

        return {
          name:`${r.manager_nickname} (${r.season} ${r.league_name || ""})`,
          value:parseFloat(r[stat]).toFixed(
            ["OBP","ERA","WHIP","K/9"].includes(stat)?3:0
          )
        };

      }).filter(Boolean);

    arr.sort((a,b)=>
      eraFields.includes(stat)
        ? parseFloat(a.value)-parseFloat(b.value)
        : parseFloat(b.value)-parseFloat(a.value)
    );

    c.innerHTML += rankTable(stat,arr.slice(0,10));
  });
}

function showWeeklyRankings(c){

  c.classList.add("grid-view");

  avgFields.forEach(stat => {

    const arr = weeklyRawData
      .map(r => {

        if(!isValid(r[stat])) return null;

        return {
          name:`${r.manager_nickname} (${r.season} W${r.week} ${r.league_name || ""})`,
          value:parseFloat(r[stat]).toFixed(
            ["OBP","ERA","WHIP","K/9"].includes(stat)?3:0
          )
        };

      }).filter(Boolean);

    arr.sort((a,b)=>
      eraFields.includes(stat)
        ? parseFloat(a.value)-parseFloat(b.value)
        : parseFloat(b.value)-parseFloat(a.value)
    );

    c.innerHTML += rankTable(stat,arr.slice(0,10));
  });
}

function showLifetimeRecord(c){

  c.innerHTML = `
    <h2>Lifetime Record</h2>
    <p>Add your lifetime record code here.</p>
  `;
}

function showLifetimeMedals(c){

  c.innerHTML = `
    <h2>Lifetime Medals</h2>
    <p>Add your lifetime medals code here.</p>
  `;
}

function buildManagerSelect(id,onClickFn){

  const opts = Object.keys(managers)
    .map(m => `<option value="${m}">${m}</option>`)
    .join("");

  let target = id==="mgr" ? "indLife" : "indSeason";

  return `
    <div style="margin-bottom:20px">
      <select id="${id}">
        ${opts}
      </select>

      <button class="show-btn" onclick="${onClickFn}()">
        SHOW STATS
      </button>
    </div>

    <div id="${target}"></div>
  `;
}

function showIndividualLifetime(c){

  c.classList.remove("grid-view");

  c.innerHTML = buildManagerSelect(
    "mgr",
    "renderIndividualLifetime"
  );
}

function renderIndividualLifetime(){

  const m = document.getElementById("mgr").value;

  const div = document.getElementById("indLife");

  const seasons = managers[m].seasons
    .slice()
    .sort((a,b)=>(a.season||0)-(b.season||0));

  const footer = {};
  const footerAvg = {};

  avgFields.forEach(stat => {

    const vals = seasons
      .map(s => isValid(s[stat]) ? parseFloat(s[stat]) : null)
      .filter(v => v !== null);

    if(vals.length===0){

      footer[stat]=null;
      footerAvg[stat]=null;
      return;
    }

    const sum = vals.reduce((a,b)=>a+b,0);

    footer[stat] = sumFields.includes(stat)
      ? sum
      : sum / vals.length;

    footerAvg[stat] = sum / vals.length;
  });

  const decimalPlaces = stat =>
    ["OBP","ERA","WHIP","K/9"].includes(stat)
      ? 3
      : 0;

  let html = `
    <h2>${m} — Season-by-Season Stats</h2>

    <div style="overflow-x:auto">

    <table>

      <thead>
        <tr>
          <th>Season</th>
          ${avgFields.map(s=>`<th>${s}</th>`).join("")}
        </tr>
      </thead>

      <tbody>
  `;

  seasons.forEach(s => {

    html += `
      <tr>

        <td style="font-weight:700;color:var(--gold)">
          ${s.season || "—"}
        </td>

        ${avgFields.map(stat => {

          const v = isValid(s[stat])
            ? parseFloat(s[stat])
            : null;

          return `
            <td>
              ${v!==null ? fmt(v,decimalPlaces(stat)) : "—"}
            </td>
          `;
        }).join("")}

      </tr>
    `;
  });

  html += `
      </tbody>

      <tfoot>

        <tr style="background:rgba(192,57,43,.25)">
          <td style="font-weight:700;color:var(--gold)">
            TOTAL
          </td>

          ${avgFields.map(stat => {

            const v = sumFields.includes(stat)
              ? footer[stat]
              : null;

            return `
              <td style="font-weight:700;color:var(--gold)">
                ${v!==null ? fmt(v,decimalPlaces(stat)) : "—"}
              </td>
            `;
          }).join("")}

        </tr>

        <tr style="background:rgba(201,162,39,.1)">
          <td style="font-weight:700;color:var(--gold)">
            AVG
          </td>

          ${avgFields.map(stat => {

            const v = footerAvg[stat];

            return `
              <td style="font-weight:700;color:var(--gold)">
                ${v!==null ? fmt(v,decimalPlaces(stat)) : "—"}
              </td>
            `;
          }).join("")}

        </tr>

      </tfoot>

    </table>

    </div>
  `;

  div.innerHTML = html;
}

function showIndividualYearly(c){

  c.classList.remove("grid-view");

  let opts = Object.keys(managers)
    .map(m => `<option value="${m}">${m}</option>`)
    .join("");

  let years = [...new Set(
    weeklyRawData.map(r => r.season)
  )]
  .sort()
  .map(y => `<option value="${y}">${y}</option>`)
  .join("");

  c.innerHTML = `
    <div style="margin-bottom:20px">

      <select id="yearMgr">
        ${opts}
      </select>

      <select id="yearSelect">
        ${years}
      </select>

      <button class="show-btn"
        onclick="renderIndividualYearly()">
        SHOW STATS
      </button>

    </div>

    <div id="individualYearlyTable"></div>
  `;
}

function renderIndividualYearly(){

  const mgr = document.getElementById("yearMgr").value;
  const year = document.getElementById("yearSelect").value;

  const div = document.getElementById("individualYearlyTable");

  const rows = weeklyRawData
    .filter(r =>
      r.manager_nickname===mgr &&
      String(r.season)===String(year)
    )
    .sort((a,b)=>Number(a.week)-Number(b.week));

  let html = `
    <h2>${mgr} — ${year} Weekly Stats</h2>

    <div style="overflow-x:auto">

    <table>

      <thead>
        <tr>
          <th>Week</th>
          ${avgFields.map(s=>`<th>${s}</th>`).join("")}
        </tr>
      </thead>

      <tbody>
  `;

  rows.forEach(r => {

    html += `
      <tr>

        <td>${r.week}</td>

        ${avgFields.map(stat => {

          const v = isValid(r[stat])
            ? parseFloat(r[stat])
            : null;

          return `
            <td>
              ${v!==null ? fmt(v,2) : "—"}
            </td>
          `;
        }).join("")}

      </tr>
    `;
  });

  html += `
      </tbody>

    </table>

    </div>
  `;

  div.innerHTML = html;
}

function showIndividualSeason(c){

  c.classList.remove("grid-view");

  c.innerHTML = buildManagerSelect(
    "mgr2",
    "renderIndividualSeason"
  );
}

function renderIndividualSeason(){

  const m = document.getElementById("mgr2").value;

  const div = document.getElementById("indSeason");

  div.style.display = "grid";
  div.style.gridTemplateColumns =
    "repeat(auto-fit,minmax(250px,1fr))";

  div.style.gap = "20px";

  let html = `
    <h2 style="grid-column:1/-1">
      ${m} — Season Rankings
    </h2>
  `;

  avgFields.forEach(stat => {

    const arr = rawData
      .filter(r => r.manager_nickname===m)
      .map(r => {

        if(!isValid(r[stat])) return null;

        return {
          name:`${r.season}`,
          value:parseFloat(r[stat]).toFixed(
            ["OBP","ERA","WHIP","K/9"].includes(stat)?3:0
          )
        };

      }).filter(Boolean);

    arr.sort((a,b)=>
      eraFields.includes(stat)
        ? parseFloat(a.value)-parseFloat(b.value)
        : parseFloat(b.value)-parseFloat(a.value)
    );

    html += rankTable(stat,arr);
  });

  div.innerHTML = html;
}

function showIndividualWeekly(c){

  c.classList.remove("grid-view");

  c.innerHTML = buildManagerSelect(
    "mgr3",
    "renderIndividualWeekly"
  );
}

function renderIndividualWeekly(){

  const m = document.getElementById("mgr3").value;

  const div = document.getElementById("indSeason");

  div.style.display = "grid";
  div.style.gridTemplateColumns =
    "repeat(auto-fit,minmax(250px,1fr))";

  div.style.gap = "20px";

  let html = `
    <h2 style="grid-column:1/-1">
      ${m} — Weekly Rankings
    </h2>
  `;

  avgFields.forEach(stat => {

    const arr = weeklyRawData
      .filter(r => r.manager_nickname===m)
      .map(r => {

        if(!isValid(r[stat])) return null;

        return {
          name:`${r.season} W${r.week}`,
          value:parseFloat(r[stat]).toFixed(
            ["OBP","ERA","WHIP","K/9"].includes(stat)?3:0
          )
        };

      }).filter(Boolean);

    arr.sort((a,b)=>
      eraFields.includes(stat)
        ? parseFloat(a.value)-parseFloat(b.value)
        : parseFloat(b.value)-parseFloat(a.value)
    );

    html += rankTable(stat,arr);
  });

  div.innerHTML = html;
}
