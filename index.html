<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.8">
<title>Fantasy League Stats — Since 2006</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #162033;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --gold: #c9a227;
    --cream: #f5f0e8;
    --glass: rgba(13,27,42,0.78);
    --glass-light: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.12);
    --border_header: #f5f0e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    background: var(--navy);
    color: var(--cream);
    position: relative;
  }

  /* ── Background ── */
  #bg {
    position: fixed;
    inset: 0;
    background-image: url('FieldOfDreams.jpg');
    background-size: cover;
    background-position: center 40%;
    z-index: 0;
  }
  #bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(13,27,42,0.82) 0%,
      rgba(13,27,42,0.65) 40%,
      rgba(13,27,42,0.88) 100%
    );
    transition: background 0.4s ease;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    padding: 36px 32px 24px;
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(13,27,42,0.95) 0%, transparent 100%);
    transition: background 0.4s ease, border-color 0.4s ease;
  }

  .header-imgs {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header-imgs img {
    height: 52px;
    width: auto;
    opacity: 0.60;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6))
            drop-shadow(0 0 18px rgba(13,27,42,0.75))
            drop-shadow(0 0 40px rgba(13,42,74,0.45));
    transition: transform 0.3s ease, filter 0.3s ease, opacity 0.3s ease;
  }
  .header-imgs img:hover {
    opacity: 1;
    transform: scale(1.08) rotate(-2deg);
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5))
            drop-shadow(0 0 22px rgba(13,42,74,0.55));
  }
  .bat-img {
    height: 44px !important;
  }
  .bat-img:hover { transform: rotate(-35deg) scale(1.1) !important; }

  .header-title {
    flex: 1;
    text-align: center;
    padding: 0 20px;
  }

  .header-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: 0.08em;
    color: #fff;
    text-shadow: 0 2px 20px rgba(192,57,43,0.5), 0 0 60px rgba(0,0,0,0.8);
    line-height: 1;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }
  .header-title .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: bold;
    margin-top: 4px;
    opacity: 0.9;
  }

  @media (max-width: 800px) {
    .header-imgs, .header-imgs-right { display: none; }
  }

@media (min-width: 801px) {
  .nav-links a {
    border: 1px solid var(--gold); /* Uses your existing variable */
    padding: 2px 4px;              /* Adds some space inside the border */
    border-radius: 4px;             /* Optional: rounds the corners */
    transition: all 0.3s ease;
  }
}

  .stitch-bar {
    position: relative;
    z-index: 10;
    height: 4px;
    background: var(--red);
    box-shadow: 0 0 12px rgba(192,57,43,0.6);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }

  /* ── Navigation ── */
  nav {
    position: relative;
    z-index: 10;
    background: rgba(13,27,42,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    transition: background 0.4s ease, border-color 0.4s ease; 
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 16px 32px;
    width: fit-content;
    margin: 0 auto;
  }

  .hamburger span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: var(--cream);
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .nav-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 18px 32px;
  }

  .nav-links a {
    color: var(--cream);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s ease;
    border: 2px solid;
    padding-bottom: 2px;
  }

  .nav-links a:hover {
    color: var(--red-bright);
  }

  .nav-links a.active {
    color: var(--red);
    border-color: var(--red);
  }

  /* Mobile Hamburger Menu */
  @media (max-width: 800px) {
    nav { padding: 0; }
    .hamburger {
      display: flex;
    }
    .nav-links {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 0 0 20px 0;
      gap: 15px;
    border: 0px;
    }
    .nav-links a {
    border: 0px;
    }
    .nav-links.show {
      display: flex;
    }
    
    /* Hamburger turning into an X */
    .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
  }

  /* ── Main Content ── */
  #wrapper {
    position: relative;
    z-index: 10;
    padding: 28px 24px;
    min-height: calc(100vh - 180px);
  }

  #content {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 1000px) {
    #content.grid-view {
      grid-template-columns: repeat(5, 1fr);
    }
  }

  /* ── Tables ── */
  table {
    border-collapse: collapse;
    width: 100%;
    background: var(--glass);
    backdrop-filter: blur(12px);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: background 0.4s ease, border-color 0.4s ease;
  }

  th, td {
    border: 1px solid rgba(255,255,255,0.07);
    padding: 7px 9px;
    text-align: center;
    font-size: 0.82rem;
    font-family: 'Barlow', sans-serif;
    transition: color 0.3s ease;
  }

  th {
    background: rgba(192,57,43,0.85);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.1em;
    font-size: 0.8rem;
    text-transform: uppercase;
    border-color: rgba(255,255,255,0.15);
    transition: background 0.4s ease;
  }

  tr:nth-child(even) { background: rgba(255,255,255,0.04); }
  tr:hover { background: rgba(201,162,39,0.08); transition: background 0.15s; }

  td:nth-child(2) { text-align: left; font-weight: 500; color: #e8dfc8; }

  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  .medal-gold   { color: var(--gold); font-weight: 700; }
  .medal-silver { color: #aaa; font-weight: 700; }
  .medal-bronze { color: #cd7f32; font-weight: 700; }

  select {
    padding: 8px 14px;
    margin-right: 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
    cursor: pointer;
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }

  .show-btn {
    padding: 8px 20px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .show-btn:hover {
    background: var(--red-bright);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(192,57,43,0.4);
  }

  .section-vertical-stack { display: flex; flex-direction: column; gap: 14px; width: 100%; }
  .no-data { color: rgba(255,255,255,0.4); font-style: italic; margin: 12px 0; }

  td:first-child { color: var(--gold); font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; }
  td:last-child { color: #c9d5e0; }

  tfoot tr td { font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; }

  /* ─────────────────────────────────────
     THEME & PILL TOGGLE STYLES
  ───────────────────────────────────── */
  .theme-switch-wrapper {
    position: absolute;
    top: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.75);
    z-index: 20;
  }

  .filter-pill-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream);
  }

  .theme-switch {
    position: relative;
    display: inline-block;
    width: 46px;
    height: 26px;
    flex-shrink: 0;
  }

  .theme-switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #3a4a5a;
    border-radius: 26px;
    transition: background-color 0.35s ease;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: #fff;
    border-radius: 50%;
    transition: transform 0.35s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  input:checked + .slider {
    background-color: var(--red);
  }

  input:checked + .slider:before {
    transform: translateX(20px);
  }

  /* ─────────────────────────────────────
     LIGHT MODE OVERRIDES
  ───────────────────────────────────── */
  body.light-mode {
    --lm-blue:       rgba(13,42,74,0.78);
    --lm-blue-mid:   #1565c0;
    --lm-blue-light: #e3eeff;
    --lm-grey:       #eaeff6;
    --lm-text:       #0d1b2a;
    --gold:       #c9a227;
    --lm-text-sub:   #3a4f66;
    --border_header: #3a4f66;
    color: var(--lm-text);
  }
  body.light-mode #bg::after { 
    background: linear-gradient(
      180deg, 
      rgba(255,255,255,0.86) 0%, 
      rgba(255,255,255,0.64) 40%, 
      rgba(255,255,255,0.80) 100%
    ); 
  }
  body.light-mode select {
    background: #ffffff;
    color: var(--lm-text);
    border-color: #c8d6e8;
  }

  body.light-mode .show-btn {
    background: var(--lm-blue);
    color: #fff;
    box-shadow: 0 4px 14px rgba(21, 101, 192, 0.4);
  }

  body.light-mode .show-btn:hover {
    background: var(--lm-blue);
    box-shadow: 0 4px 18px rgba(21, 101, 192, 0.8);
  }

  body.light-mode header { background: linear-gradient(180deg, rgba(13,27,42,0.62) 0%, transparent 100%); }
  body.light-mode .header-title h1 { text-shadow: 0 2px 20px rgba(13,71,161,0.4), 0 0 60px rgba(0,0,0,0.6); }
  body.light-mode .stitch-bar { background: var(--lm-blue); }
  
  body.light-mode nav { background: rgba(248,250,253,0.98); border: 2px solid var(--lm-grey); }
  body.light-mode .nav-links a { color: var(--lm-text-sub); }
  body.light-mode .nav-links a:hover { color: var(--gold); }
  body.light-mode .nav-links a.active { color: var(--gold); border-color: var(--gold); }
  body.light-mode .hamburger span { background-color: var(--lm-text); }
  
  body.light-mode table { background: #ffffff; border-color: #c8d6e8; }
  body.light-mode th { background: var(--lm-blue); color: #fff; }
  body.light-mode tbody tr:nth-child(even) { background: var(--lm-grey); }
  body.light-mode tbody tr:hover { background: var(--lm-blue-light); }
  body.light-mode td:nth-child(2) { color: var(--lm-text); }
  body.light-mode td:last-child { color: var(--lm-text); }
  body.light-mode td:first-child { color: #c9a227; }
  body.light-mode h2 { color: #c9a227; text-shadow: none; }
  body.light-mode .filter-pill-wrapper { color: var(--lm-text); }
  body.light-mode input:checked + .slider { background-color: var(--lm-blue); }
  body.light-mode .subtitle {color: var(--lm-text)};
</style>
</head>
<body>

<div id="bg"></div>

<header>
  <div class="header-imgs">
    <img src="MLB-Logo.jpg" alt="MLB" />
    <img src="Baseball-bat.jpg" class="bat-img" alt="bat" />
  </div>

  <div class="header-title">
    <h1>Fantasy League Stats</h1>
    <div class="subtitle">⚾ &nbsp; Champions Since 2006 &nbsp; ⚾</div>
  </div>

  <div class="header-imgs header-imgs-right">
    <img src="Baseball-bat.jpg" class="bat-img" alt="bat" />
    <img src="MLB-Logo.jpg" alt="MLB" />
  </div>

  <div class="theme-switch-wrapper">
    <span>Dark</span>
    <label class="theme-switch" for="checkbox">
      <input type="checkbox" id="checkbox" />
      <div class="slider"></div>
    </label>
    <span>Light</span>
  </div>
</header>

<div class="stitch-bar"></div>

<nav>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="nav-links" id="navLinks">
        <a class="active" onclick="setPage('lifetime'); toggleMenu()">LIFETIME RANKINGS</a>
        <a onclick="setPage('seasonRankings'); toggleMenu()">SEASON RANKINGS</a>
        <a onclick="setPage('weeklyRankings'); toggleMenu()">WEEKLY RANKINGS</a>
        <a onclick="setPage('lifetimeRecord'); toggleMenu()">RECORDS</a>
        <a onclick="setPage('lifetimeMedals'); toggleMenu()">MEDALS</a>
        <a onclick="setPage('individualLifetime'); toggleMenu()">LIFETIME STATS</a>
        <a onclick="setPage('individualYearly'); toggleMenu()">YEARLY STATS</a>
        <a onclick="setPage('individualSeason'); toggleMenu()">PERSONAL YEARLY RANKINGS</a>
        <a onclick="setPage('individualWeekly'); toggleMenu()">PERSONAL WEEKLY RANKINGS</a>
        <a onclick="setPage('exportData'); toggleMenu()">EXPORT DATA</a>
    </div>
</nav>

<div id="wrapper">
  <div id="content"></div>
</div>

<script>
/* ── Mobile Menu Toggle ── */
function toggleMenu() {
  if (window.innerWidth <= 800) {
    document.getElementById('navLinks').classList.toggle('show');
    document.getElementById('hamburger').classList.toggle('active');
  }
}

/* ── Theme Toggle Logic ── */
const toggleSwitch = document.querySelector('#checkbox');
const savedTheme   = localStorage.getItem('theme');
const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

if (savedTheme) {
  document.body.classList.toggle('light-mode', savedTheme === 'light');
  toggleSwitch.checked = (savedTheme === 'light');
} else {
  if (!systemPrefersDark) {
    document.body.classList.add('light-mode');
    toggleSwitch.checked = true;
  }
}

function switchTheme(e) {
  if (e.target.checked) {
    document.body.classList.add('light-mode');
    localStorage.setItem('theme', 'light');
  } else {
    document.body.classList.remove('light-mode');
    localStorage.setItem('theme', 'dark');
  }
}
toggleSwitch.addEventListener('change', switchTheme);

/* ── Global Filter State ── */
let includeLongWeeks = false;

function handleLongWeeksToggle(e) {
  includeLongWeeks = e.checked;
  // Refresh the page to apply the filter
  const c = document.getElementById("content");
  if (currentPage === "weeklyRankings") showWeeklyRankings(c);
  if (currentPage === "individualWeekly") renderIndividualWeekly();
}

/* ── Fantasy League Data & Logic ── */
let rawData = [];
let weeklyRawData = [];
let managers = {};

const numericFields = ["R","HR","RBI","SB","TB","E","W","CG","SV","QS"];
const avgFields     = ["R","HR","RBI","SB","TB","E","OBP","W","CG","SV","ERA","WHIP","K/9","QS"];
const eraFields     = ["ERA","WHIP"];
const sumFields     = ["R","HR","RBI","SB","TB","E","W","CG","SV","QS"];

let currentPage = "lifetime";

Promise.all([
  fetch("all_seasons_stats.json?v=" + Date.now()).then(r => r.json()),
  fetch("all_seasons_weeks_stats.json?v=" + Date.now()).then(r => r.json())
]).then(([seasonData, weekData]) => {
  rawData = Array.isArray(seasonData) ? seasonData : Object.values(seasonData).flat();
  weeklyRawData = [];
  Object.keys(weekData).forEach(year => {
    Object.keys(weekData[year]).forEach(week => {
      weeklyRawData.push(...weekData[year][week]);
    });
  });
  processData();
  setPage("lifetime");
});

function processData() {
  rawData.forEach(row => {
    const m = row.manager_nickname;
    if (!managers[m]) {
      managers[m] = { seasons: [], totals: {}, averages: {}, counts: {}, record: { w: 0, l: 0, t: 0, seasons: 0 }, medals: { regular: {1:0, 2:0, 3:0}, playoff: {1:0, 2:0, 3:0} } };
    }
    managers[m].seasons.push(row);
    numericFields.concat(avgFields).forEach(stat => {
      if (!isValid(row[stat])) return;
      const val = parseFloat(row[stat]);
      managers[m].totals[stat] = (managers[m].totals[stat] || 0) + val;
      managers[m].counts[stat] = (managers[m].counts[stat] || 0) + 1;
    });
    if (isValid(row.wins) && isValid(row.losses)) {
      managers[m].record.w += parseFloat(row.wins);
      managers[m].record.l += parseFloat(row.losses);
      managers[m].record.t += (isValid(row.ties) ? parseFloat(row.ties) : 0);
      managers[m].record.seasons++;
    }
    const seed = parseInt(row.playoff_seed);
    if (!isNaN(seed) && seed >= 1 && seed <= 3) managers[m].medals.regular[seed]++;
    const rank = parseInt(row.final_rank);
    if (!isNaN(rank) && rank >= 1 && rank <= 3) managers[m].medals.playoff[rank]++;
  });
}

function isValid(v){ return v !== undefined && v !== null && v !== "" && !isNaN(v); }
function fmt(v,d=0){ return Number(v).toFixed(d); }
function winPct(w, l, t) { const total = w + l + t; return total === 0 ? null : (w + t * 0.5) / total; }

function rankTable(title,arr){
  return `
    <div class="card">
      <h2>${title}</h2>
      <table>
        <thead><tr><th>#</th><th>Team</th><th>Value</th></tr></thead>
        <tbody>
          ${arr.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${r.name}</td><td>${r.value}</td></tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function setPage(page) {
  currentPage = page;
  
  // 1. Clear 'active' class from ALL links
  const links = document.querySelectorAll(".nav-links a");
  links.forEach(b => b.classList.remove("active"));
  
  // 2. Determine which link should be active
  if (event && event.target && event.target.tagName === 'A') {
    // If called by a click, use the clicked element
    event.target.classList.add("active");
  } else {
    // If called on page load, find the link that matches the 'page' argument
    // This looks for the link that runs the specific setPage command
    links.forEach(link => {
      if (link.getAttribute('onclick').includes(`setPage('${page}')`)) {
        link.classList.add("active");
      }
    });
  }

  const c = document.getElementById("content");
  c.innerHTML = "";
  
  // 3. Render the correct content
  if(page==="lifetime") showLifetime(c);
  if(page==="seasonRankings") showSeasonRankings(c);
  if(page==="weeklyRankings") showWeeklyRankings(c);
  if(page==="lifetimeRecord") showLifetimeRecord(c);
  if(page==="lifetimeMedals") showLifetimeMedals(c);
  if(page==="individualLifetime") showIndividualLifetime(c);
  if(page==="individualYearly") showIndividualYearly(c);
  if(page==="individualSeason") showIndividualSeason(c);
  if(page==="individualWeekly") showIndividualWeekly(c);
  if(page==="exportData") showExportData(c);
}
/* ── Specific Render Functions ── */

function showLifetime(c){
  c.classList.add("grid-view");
  avgFields.forEach(stat => {
    const arr = Object.keys(managers).map(mgr => {
      const vals = managers[mgr].seasons.map(s => parseFloat(s[stat])).filter(v => !isNaN(v));
      if(vals.length===0) return null;
      const val = sumFields.includes(stat) ? vals.reduce((a,b)=>a+b,0) : vals.reduce((a,b)=>a+b,0) / vals.length;
      return { name:mgr, value:fmt(val, ["OBP","ERA","WHIP","K/9"].includes(stat)?3:0) };
    }).filter(Boolean);
    arr.sort((a,b)=> eraFields.includes(stat) ? parseFloat(a.value)-parseFloat(b.value) : parseFloat(b.value)-parseFloat(a.value) );
    c.innerHTML += rankTable(stat,arr.slice(0,10));
  });
}

function showWeeklyRankings(c){
  c.classList.add("grid-view");
  
  // Add Filter Toggle
  let filterHtml = `
    <div class="filter-pill-wrapper" style="grid-column: 1/-1;">
      <span style="opacity: 0.6;">Exclude</span>
      <label class="theme-switch">
        <input type="checkbox" onchange="handleLongWeeksToggle(this)" ${includeLongWeeks ? 'checked' : ''}>

      </label>
      <span style="opacity: 0.6;">Include</span>
      <span style="color: var(--gold); margin-left: 2px;">long weeks.</span>
    </div>
  `;
  c.innerHTML = filterHtml;

  avgFields.forEach(stat => {
    const arr = weeklyRawData
      .filter(r => {
        // Updated filter logic based on toggle state
        const validDays = includeLongWeeks ? true : (isValid(r.week_days) && parseFloat(r.week_days) <= 7);
        return validDays;
      })
      .map(r => {
        if(!isValid(r[stat])) return null;
        return {
          name:`${r.manager_nickname} (${r.season} W${r.week} ${r.league_name || ""})`,

        };
      }).filter(Boolean);

    arr.sort((a,b)=> eraFields.includes(stat) ? parseFloat(a.value)-parseFloat(b.value) : parseFloat(b.value)-parseFloat(a.value));

function showIndividualWeekly(c){
  c.classList.remove("grid-view");
  // Build standard manager selection but result targets "indSeason" area
  const opts = Object.keys(managers).map(m => `<option value="${m}">${m}</option>`).join("");
  c.innerHTML = `
    <div class="filter-pill-wrapper">
      <span style="opacity: 0.6;">Exclude</span>
      <label class="theme-switch">
        <input type="checkbox" onchange="handleLongWeeksToggle(this)" ${includeLongWeeks ? 'checked' : ''}>
        <div class="slider"></div>
      </label>
      <span style="opacity: 0.6;">Include</span>
      <span style="color: var(--gold); margin-left: 2px;">long weeks.</span>
    </div>
    <div style="margin-bottom:20px">
      <select id="mgr3">${opts}</select>
      <button class="show-btn" onclick="renderIndividualWeekly()">SHOW STATS</button>
    </div>
    <div id="indSeason"></div>
  `;

function renderIndividualWeekly(){
  const m = document.getElementById("mgr3").value;
  const div = document.getElementById("indSeason");
  div.style.display = "grid";
  div.style.gridTemplateColumns = "repeat(auto-fit,minmax(250px,1fr))";
  div.style.gap = "20px";
  let html = `<h2 style="grid-column:1/-1">${m} — Weekly Rankings</h2>`;

  avgFields.forEach(stat => {
    const arr = weeklyRawData
      .filter(r => {
        const isMgr = r.manager_nickname === m;
        // Updated filter logic based on toggle state
        const validDays = includeLongWeeks ? true : (isValid(r.week_days) && parseFloat(r.week_days) <= 7);
        return isMgr && validDays;
      })
      .map(r => {
        if(!isValid(r[stat])) return null;
        return {
          name:`${r.season} W${r.week}`,
          value:parseFloat(r[stat]).toFixed(["OBP","ERA","WHIP","K/9"].includes(stat)?3:0)
        };
      }).filter(Boolean);

    arr.sort((a,b)=> eraFields.includes(stat) ? parseFloat(a.value)-parseFloat(b.value) : parseFloat(b.value)-parseFloat(a.value));
    html += rankTable(stat, arr.slice(0, 10));
  });
  div.innerHTML = html;
}

function showLifetimeRecord(container) {
  container.classList.remove('grid-view');
  const rows = Object.keys(managers).map(m => {
    const r = managers[m].record;
    return { name: m, w: r.w, l: r.l, t: r.t, pct: winPct(r.w, r.l, r.t), seasons: r.seasons };
  }).filter(r => r.seasons > 0).sort((a, b) => (b.pct ?? -1) - (a.pct ?? -1));
  let lt = `<h2>Combined Lifetime Record</h2>`;
  lt += `<table><tr><th>#</th><th>Manager</th><th>W</th><th>L</th><th>T</th><th>Win%</th></tr>`;
  rows.forEach((r, i) => { lt += `<tr><td>${i + 1}</td><td>${r.name}</td><td>${r.w}</td><td>${r.l}</td><td>${r.t}</td><td>${fmt(r.pct, 3)}</td></tr>`; });
  lt += `</table>`;
  container.innerHTML = `<div class="section-vertical-stack">${lt}</div>`;
}

function showLifetimeMedals(container) {
  container.classList.remove('grid-view');
  const medalScore = (med) => med[1] * 3 + med[2] * 2 + med[3] * 1;
  const buildMedalTable = (title, field) => {
    const rows = Object.keys(managers).map(m => {
      const med = managers[m].medals[field];
      return { name: m, first: med[1], second: med[2], third: med[3], score: medalScore(med) };
    }).filter(r => r.first + r.second + r.third > 0).sort((a, b) => b.score - a.score);
    let html = `<h2>${title}</h2><table><tr><th>#</th><th>Manager</th><th class="medal-gold">🥇 1st</th><th class="medal-silver">🥈 2nd</th><th class="medal-bronze">🥉 3rd</th><th>Score</th></tr>`;
    rows.forEach((r, i) => { html += `<tr><td>${i+1}</td><td>${r.name}</td><td class="medal-gold">${r.first}</td><td class="medal-silver">${r.second}</td><td class="medal-bronze">${r.third}</td><td>${r.score}</td></tr>`; });
    return html + `</table>`;
  };
  container.innerHTML = `<p style="color:var(--gold);font-size:12px;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;font-weight:bold;">Score = (1st × 3) + (2nd × 2) + (3rd × 1)</p>
                         <div class="section-vertical-stack">${buildMedalTable("Regular Season Finishes", "regular")}${buildMedalTable("Playoff Finishes", "playoff")}</div>`;
}

function renderIndividualLifetime(){

  const div = document.getElementById("indLife");
  const seasons = managers[m].seasons.slice().sort((a,b)=>(a.season||0)-(b.season||0));
  let html = `<h2>${m} — Season-by-Season Stats</h2><table><thead><tr><th>Season</th>${avgFields.map(s=>`<th>${s}</th>`).join("")}</tr></thead><tbody>`;
  seasons.forEach(s => {
    html += `<tr><td style="font-weight:700;color:var(--gold)">${s.season || "—"}</td>${avgFields.map(stat => {
      const v = isValid(s[stat]) ? parseFloat(s[stat]) : null;
      return `<td>${v!==null ? fmt(v, ["OBP","ERA","WHIP","K/9"].includes(stat)?3:0) : "—"}</td>`;
    }).join("")}</tr>`;
  });
  div.innerHTML = html + `</tbody></table>`;
}
